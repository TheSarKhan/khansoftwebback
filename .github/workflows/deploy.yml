# .github/workflows/deploy.yml

name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/starsoftwebback
            git pull origin main
            docker compose up -d --build backend
            docker compose logs backend --tail 30

      - name: Notify Telegram (Success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ *starsoft backend deploy uğurlu oldu*%0A%0ABranch: \`main\`%0ACommit: \`${{ github.sha }}\`%0AAuthor: ${{ github.actor }}" \
            -d parse_mode="Markdown"

      - name: Notify Telegram (Failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ *starsoft backend deploy UĞURSUZ oldu*%0A%0ABranch: \`main\`%0ACommit: \`${{ github.sha }}\`%0AAuthor: ${{ github.actor }}" \
            -d parse_mode="Markdown"
